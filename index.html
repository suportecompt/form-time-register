<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Intervenções</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <img src="logo.png" alt="TechFlow Logo" class="h-16 mx-auto mb-4 object-contain" onerror="this.src='https://via.placeholder.com/150x50?text=LOGO'">
            <h1 class="text-2xl font-bold text-gray-800">Bem-vindo</h1>
            <p class="text-gray-500 text-sm mt-1">Gestão de Intervenções</p>
        </div>

        <div id="login-error" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-3 mb-6 text-sm rounded">
            </div>

        <form id="login-form" class="space-y-6">
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="tecnico@empresa.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Palavra-passe</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="btn-login"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors duration-200 flex justify-center items-center">
                Entrar
            </button>
        </form>

    </div>

    <script src="app.js"></script>
</body>
</html>
